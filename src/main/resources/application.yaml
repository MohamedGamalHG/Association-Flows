spring:
  application:
    name: Association-Flows
  datasource:
    url: jdbc:postgresql://localhost:5432/association-flows
    username: postgresql
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


